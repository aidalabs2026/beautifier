name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: site
        run: npm install --no-audit --no-fund

      - name: Type check
        working-directory: site
        run: npm run check

      - name: Build
        working-directory: site
        run: npm run build
